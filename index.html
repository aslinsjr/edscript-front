<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports API Explorer</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h1>⚡ Sports API</h1>
  <div class="endpoint-group">
    <div class="group-label">Eventos</div>
    <button class="endpoint-btn active" onclick="selectEndpoint(this)" data-path="/api/events/inplay" data-required="sport_id" data-optional="league_id">
      <span class="method-badge">GET</span>Inplay
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/events/upcoming" data-required="sport_id" data-optional="league_id,team_id,cc,day,skip_esports,page">
      <span class="method-badge">GET</span>Upcoming
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/events/ended" data-required="sport_id" data-optional="league_id,team_id,cc,day,skip_esports,page">
      <span class="method-badge">GET</span>Ended
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/events/search" data-required="sport_id,home,away,time" data-optional="">
      <span class="method-badge">GET</span>Search
    </button>
  </div>
  <div class="endpoint-group">
    <div class="group-label">Evento</div>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/event/view" data-required="event_id" data-optional="" data-note="Até 10 event_ids separados por vírgula">
      <span class="method-badge">GET</span>View
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/event/odds/summary" data-required="event_id" data-optional="">
      <span class="method-badge">GET</span>Odds Summary
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/event/odds" data-required="event_id" data-optional="source,since_time,odds_market">
      <span class="method-badge">GET</span>Odds
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/event/stats_trend" data-required="event_id" data-optional="" data-note="Soccer only — eventos após Out/2019">
      <span class="method-badge">GET</span>Stats Trend
    </button>
    <button class="endpoint-btn" onclick="selectEndpoint(this)" data-path="/api/event/lineup" data-required="event_id" data-optional="" data-note="Soccer only">
      <span class="method-badge">GET</span>Lineup
    </button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SPORTS BAR -->
  <div id="sports-bar">
    <button class="sport-pill active" onclick="setSport(this,1)">⚽ Soccer</button>
    <button class="sport-pill" onclick="setSport(this,13)">🎾 Tennis</button>
    <button class="sport-pill" onclick="setSport(this,18)">🏀 Basketball</button>
    <button class="sport-pill" onclick="setSport(this,17)">🏒 Ice Hockey</button>
    <button class="sport-pill" onclick="setSport(this,12)">🏈 American Football</button>
    <button class="sport-pill" onclick="setSport(this,78)">🤾 Handball</button>
    <button class="sport-pill" onclick="setSport(this,91)">🏐 Volleyball</button>
    <button class="sport-pill" onclick="setSport(this,92)">🏓 Table Tennis</button>
    <button class="sport-pill" onclick="setSport(this,83)">⚽ Futsal</button>
    <button class="sport-pill" onclick="setSport(this,8)">🏉 Rugby Union</button>
    <button class="sport-pill" onclick="setSport(this,19)">🏉 Rugby League</button>
    <button class="sport-pill" onclick="setSport(this,9)">🥊 Boxing</button>
    <button class="sport-pill" onclick="setSport(this,162)">🥋 MMA/UFC</button>
    <button class="sport-pill" onclick="setSport(this,3)">🏏 Cricket</button>
    <button class="sport-pill" onclick="setSport(this,16)">⚾ Baseball</button>
    <button class="sport-pill" onclick="setSport(this,14)">🎱 Snooker</button>
    <button class="sport-pill" onclick="setSport(this,15)">🎯 Darts</button>
    <button class="sport-pill" onclick="setSport(this,94)">🏸 Badminton</button>
    <button class="sport-pill" onclick="setSport(this,95)">🏐 Beach Volleyball</button>
    <button class="sport-pill" onclick="setSport(this,2)">🐎 Horse Racing</button>
    <button class="sport-pill" onclick="setSport(this,4)">🐕 Greyhounds</button>
    <button class="sport-pill" onclick="setSport(this,36)">🏉 Australian Rules</button>
    <button class="sport-pill" onclick="setSport(this,66)">🎳 Bowls</button>
    <button class="sport-pill" onclick="setSport(this,75)">🏑 Gaelic Sports</button>
    <button class="sport-pill" onclick="setSport(this,90)">🏑 Floorball</button>
    <button class="sport-pill" onclick="setSport(this,107)">🎾 Squash</button>
    <button class="sport-pill" onclick="setSport(this,110)">🤽 Water Polo</button>
    <button class="sport-pill" onclick="setSport(this,151)">🎮 E-sports</button>
  </div>

  <!-- PARAMS -->
  <div id="params-panel">
    <div id="endpoint-title">GET /api/events/inplay</div>
    <div class="params-grid" id="params-grid"></div>
    <div id="note"></div>
  </div>

  <!-- RESULTS -->
  <div id="results-area">
    <div id="error-msg"></div>
    <div id="loading"><div class="spinner"></div>Buscando dados...</div>

    <div id="status-bar" style="display:none">
      <div class="stat-chip">Total: <span id="total-count">0</span></div>
      <div class="stat-chip">Página: <span id="page-info">—</span></div>
      <div id="view-toggle">
        <button class="toggle-btn active" onclick="switchView('cards')">Cards</button>
        <button class="toggle-btn" onclick="switchView('json')">JSON</button>
      </div>
    </div>

    <div id="cards-container"></div>
    <div id="json-container"><pre id="json-pre"></pre></div>

    <div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <p>Selecione um endpoint e clique em <strong>Executar</strong></p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div id="modal-header">
      <div id="modal-title">
        <div class="m-league" id="m-league"></div>
        <div class="m-teams" id="m-teams"></div>
        <div class="m-score" id="m-score"></div>
      </div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-tabs">
      <button class="m-tab active" onclick="switchModalTab('info')">Informações</button>
      <button class="m-tab" onclick="switchModalTab('stats')">Estatísticas</button>
      <button class="m-tab" onclick="switchModalTab('scores')">Parciais</button>
      <button class="m-tab m-tab-ai" onclick="switchModalTab('ai')">Previsão IA</button>
      <button class="m-tab" onclick="switchModalTab('json')">JSON</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

</body>
</html>
